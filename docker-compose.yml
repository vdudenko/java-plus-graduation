services:
  stats-db:
    image: postgres:16.1
    container_name: stats-service-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - stats_data:/var/lib/postgresql/data
    restart: on-failure
volumes:
  stats_data:
  ewm_data: